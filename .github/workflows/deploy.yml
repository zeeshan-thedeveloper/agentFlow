name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/zeeshan-thedeveloper/agentflow-api

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to droplet
        run: |
          cat > /tmp/agentflow.env << 'EOF'
          DATABASE_URL=${{ secrets.AGENTFLOW_DATABASE_URL }}
          NEXTAUTH_SECRET=${{ secrets.AGENTFLOW_NEXTAUTH_SECRET }}
          API_KEY_ENCRYPTION_SECRET=${{ secrets.AGENTFLOW_API_KEY_ENCRYPTION_SECRET }}
          EOF

          scp -i ~/.ssh/deploy_key /tmp/agentflow.env zeesh@${{ secrets.DROPLET_IP }}:~/apps/agentflow/.env

          ssh -i ~/.ssh/deploy_key zeesh@${{ secrets.DROPLET_IP }} "
            set -e
            cd ~/apps/agentflow
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate api
            docker image prune -f
          "
