name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/zeeshan-thedeveloper/agentflow-api

jobs:
  deploy:
    name: Build & Deploy API
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate deploy secrets
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$DROPLET_HOST" ]; then
            echo "::error::Missing GitHub secret DROPLET_HOST (droplet public IP, e.g. 134.209.221.190)"
            exit 1
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Missing GitHub secret SSH_PRIVATE_KEY (base64-encoded private key)"
            exit 1
          fi

      - name: Setup SSH
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DROPLET_HOST" >> ~/.ssh/known_hosts
          echo "Key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key || echo "Key parse failed"

      - name: Capture last good SHA
        id: rollback
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          LAST_GOOD=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "zeesh@${DROPLET_HOST}" \
            "cat ~/apps/agentflow/last-good-sha.txt 2>/dev/null || echo ''")
          echo "sha=${LAST_GOOD}" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "zeesh@${DROPLET_HOST}" \
            "docker run --rm --env-file ~/apps/agentflow/.env \
             ghcr.io/zeeshan-thedeveloper/agentflow-api:sha-${{ github.event.workflow_run.head_sha }} \
             npx prisma migrate deploy"

      - name: Deploy to droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "zeesh@${DROPLET_HOST}" "cd ~/apps/agentflow && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d --force-recreate api && docker image prune -f"

      - name: Verify deploy
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          for i in $(seq 1 12); do
            if curl -fsS https://agentflow-api.zeeshanahmed.app/health > /dev/null; then
              echo "Health check passed (attempt $i)"
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "zeesh@${DROPLET_HOST}" \
                "echo '${DEPLOY_SHA}' > ~/apps/agentflow/last-good-sha.txt"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60s, rolling back"
          PREV="${{ steps.rollback.outputs.sha }}"
          if [ -n "$PREV" ]; then
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "zeesh@${DROPLET_HOST}" \
              "docker pull ghcr.io/zeeshan-thedeveloper/agentflow-api:sha-${PREV} && \
               docker tag ghcr.io/zeeshan-thedeveloper/agentflow-api:sha-${PREV} ghcr.io/zeeshan-thedeveloper/agentflow-api:latest && \
               cd ~/apps/agentflow && docker compose -f docker-compose.prod.yml up -d --force-recreate api"
          else
            echo "No previous SHA recorded; skip rollback"
          fi
          exit 1

      - name: Notify
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping notification"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHA_SHORT="${SHA:0:7}"
          STATUS="${{ job.status }}"
          MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "deploy")
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"Deploy ${STATUS} — \`${SHA_SHORT}\` — ${MSG}\"}" \
            "$SLACK_WEBHOOK_URL"
