name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Type check (API)
        working-directory: apps/api
        run: pnpm exec tsc --noEmit

      - name: Test (API)
        working-directory: apps/api
        run: pnpm test

      - name: Lint (API)
        working-directory: apps/api
        run: pnpm exec eslint src --ext .ts --max-warnings=0

      - name: Lint (Web)
        working-directory: apps/web
        run: pnpm lint

      - name: Type check (Web)
        working-directory: apps/web
        run: pnpm type-check

      - name: Build (API)
        working-directory: apps/api
        run: pnpm build

      - name: Build (Web)
        working-directory: apps/web
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXTAUTH_URL: http://localhost:3100
          NEXTAUTH_SECRET: ci-nextauth-secret-placeholder-32ch
          API_KEY_ENCRYPTION_SECRET: ci-api-key-encrypt-placeholder-32c
          NEXT_PUBLIC_API_URL: http://localhost:3001
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder

  trivy:
    name: Container vulnerability scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: agentflow-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: agentflow-api:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
