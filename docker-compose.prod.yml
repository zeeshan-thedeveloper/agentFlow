services:
  api:
    image: ghcr.io/zeeshan-thedeveloper/agentflow-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 18001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://localhost:6379/1
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET}
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
